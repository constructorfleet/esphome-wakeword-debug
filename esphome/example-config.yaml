esphome:
  name: audio-stream-device
  platform: ESP32
  board: esp32dev
  # Publish audio configuration (retained message for multi-assistant support)
  # This allows the ingest service to configure buffers with correct audio parameters
  on_boot:
    - priority: -100
      then:
        - mqtt.publish:
            topic: satellite1/audio_debug/assistant1/audio_info
            payload: '{"sample_rate":48000,"bits_per_sample":32,"channels":1}'
            retain: true

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "YOUR_API_ENCRYPTION_KEY"

ota:
  password: "YOUR_OTA_PASSWORD"

wifi:
  ssid: "YOUR_WIFI_SSID"
  password: "YOUR_WIFI_PASSWORD"
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Audio Stream Fallback"
    password: "YOUR_FALLBACK_PASSWORD"

captive_portal:

# MQTT Configuration
mqtt:
  broker: "YOUR_MQTT_BROKER"
  port: 1883
  username: "YOUR_MQTT_USERNAME"
  password: "YOUR_MQTT_PASSWORD"

# Microphone Configuration
microphone:
  - platform: i2s_audio
    id: sat1_mics
    i2s_din_pin: GPIO26
    i2s_bclk_pin: GPIO33  # Bit clock (SCK)
    i2s_lrclk_pin: GPIO25  # Left/Right clock (WS)
    adc_type: external
    pdm: false
    channel: left
    sample_rate: 48000
    bits_per_sample: 32bit
    on_data:
      then:
        - if:
            condition:
              - switch.is_on: enable_audio_debug
            then:
              - mqtt.publish:
                  # For multi-assistant support, append assistant ID to topic
                  # Example: satellite1/audio_debug/pcm/assistant1
                  topic: satellite1/audio_debug/assistant1/pcm
                  payload: !lambda |-
                    return esphome::base64_encode(x);

# Micro Wake Word Configuration
micro_wake_word:
  id: mww
  microphone: sat1_mics
  models:
    - model: https://your-server.com/path/to/hey_eddie/hey_eddie.json
      id: hey_eddie
    - model: https://your-server.com/path/to/hey_eddie/hey_eddie.v3.0.json
      id: hey_eddie_v3_0
  on_wake_word_detected:
    - if:
        condition:
          - switch.is_on: enable_audio_debug
        then:
          - mqtt.publish:
              # For multi-assistant support, append same assistant ID to topic
              # Must match the ID used in audio_debug/pcm topic above
              topic: satellite1/audio_debug/assistant1/events
              payload: '{"event":"wake","rate":48000,"bits":32,"channels":1}'

# Debug Audio Switch
switch:
  - platform: template
    id: enable_audio_debug
    name: "Satellite1 Debug Audio"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
