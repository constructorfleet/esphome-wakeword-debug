name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate version tag
        id: tag
        run: |
          # Generate a date-based version tag
          VERSION="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated tag: $VERSION"
      
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}
  
  build-and-push:
    runs-on: ubuntu-latest
    needs: [create-tag]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=tag
            type=raw,value=${{ needs.create-tag.outputs.tag }},enable=${{ needs.create-tag.result == 'success' }}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./ingest_service
          file: ./ingest_service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}
  
  create-release:
    runs-on: ubuntu-latest
    needs: [create-tag, build-and-push]
    if: needs.create-tag.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          name: Release ${{ needs.create-tag.outputs.tag }}
          body: |
            ## Docker Image
            This release includes a Docker image published to GitHub Container Registry:
            
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ needs.create-tag.outputs.tag }}
            ```
            
            ### Changes
            - Automated release from commit ${{ github.sha }}
          draft: false
          prerelease: false
